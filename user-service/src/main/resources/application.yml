server:
  port: 8082

spring:
  application:
    name: user-service
  config:
    import: optional:configserver:http://localhost:8888
  datasource:
    url: jdbc:mysql://localhost:3306/user_db
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        jdbc:
          batch-size: 50
        order_inserts: true
        order_updates: true
      jakarta:
        persistence:
          lock:
            timeout: 3000



  security:
    oauth2:
      client:
        registration:
          google:
            client-name: google
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            scope:
              - email
              - profile
            redirect-uri: "{baseUrl}/api/auth/oauth2/callback/{registrationId}"

jwt:
  secret: ${JWT_SECRET_KEY}
  expires: ${JWT_EXPIRES}
  refresh-expiration-ms: ${JWT_REFRESH}

app:
  frontend-url: http://localhost:3000
  oauth2:
    redirect-uri: http://localhost:3000/oauth2/success




